name: CI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 构建平台
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: EAS 构建配置
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      submit:
        description: 构建完成后自动提交应用商店（仅 production）
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.10.0"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.meta.outputs.platform }}
      profile: ${{ steps.meta.outputs.profile }}
      submit: ${{ steps.meta.outputs.submit }}

    steps:
      - name: Resolve release parameters
        id: meta
        run: |
          set -euo pipefail
          echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          echo "submit=${{ inputs.submit }}" >> "$GITHUB_OUTPUT"

  release:
    name: "${{ needs.plan.outputs.platform }} · ${{ needs.plan.outputs.profile }}"
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Validate release version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::标签 ${{ github.ref_name }} 与 package.json 版本 ${PKG_VERSION} 不一致"
            exit 1
          fi

      - name: Validate EAS project
        run: |
          set -euo pipefail
          PROJECT_ID="$(node -p "require('./app.json').expo?.extra?.eas?.projectId || ''")"
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::未配置 expo.extra.eas.projectId"
            echo "::error::请先在本地运行: pnpm exec eas init"
            exit 1
          fi
          echo "EAS project: $PROJECT_ID"

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS
        env:
          PLATFORM: ${{ needs.plan.outputs.platform }}
          PROFILE: ${{ needs.plan.outputs.profile }}
          SUBMIT: ${{ needs.plan.outputs.submit }}
        run: |
          set -euo pipefail
          args=(--platform "$PLATFORM" --profile "$PROFILE" --non-interactive --wait)
          if [ "$SUBMIT" = "true" ]; then
            if [ "$PROFILE" != "production" ]; then
              echo "::error::自动提交仅支持 production 配置"
              exit 1
            fi
            args+=(--auto-submit)
          fi
          eas build "${args[@]}"
